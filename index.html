<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Scratch Pad</title>
<style>
  :root{
    --red:#d8232f; --red-d:#9c151f; --led:#37e29f;
    --metal-hi:#f4f6f8; --metal:#d3d6da; --metal-md:#b6b9be; --metal-lo:#8f9398; --metal-edge:#6c7075;
    --ink:#26282c; --lcd:#7CFFB2; --lcd-bg:#08140d;
  }
  *{box-sizing:border-box; -webkit-user-select:none; user-select:none; -webkit-touch-callout:none; -webkit-tap-highlight-color:transparent;}
  html,body{height:100%; margin:0; overflow:hidden;}
  body{
    color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"Helvetica Neue",Arial,sans-serif;
    display:flex; flex-direction:column;
    padding:env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
    touch-action:manipulation;
    /* brushed-aluminium deck */
    background-color:#c4c7cb;
    background-image:
      linear-gradient(180deg, rgba(255,255,255,.38), rgba(0,0,0,.08) 55%, rgba(0,0,0,.22)),
      repeating-linear-gradient(90deg, rgba(255,255,255,.11) 0 1px, rgba(0,0,0,.05) 1px 2px, rgba(255,255,255,0) 2px 3px);
  }

  /* ---- header / brand plate ---- */
  header{ padding:12px 12px 4px; display:flex; align-items:center; gap:8px; }
  .brand{ display:flex; flex-direction:column; line-height:1; }
  .brand .b1{ font-weight:800; font-size:17px; letter-spacing:3px; color:#1b1d21; }
  .brand .b2{ font-size:9px; letter-spacing:2px; color:var(--red); font-weight:800; margin-top:3px; }
  .track{ font-size:11px; color:#4c4f54; flex:1; min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; text-align:right; }

  /* ---- metallic buttons ---- */
  .loadbtn,.ctl,.mbtn{
    -webkit-appearance:none; appearance:none; cursor:pointer; color:var(--ink);
    font-weight:700; border-radius:8px; border:1px solid var(--metal-edge);
    background:linear-gradient(180deg, var(--metal-hi), var(--metal-md));
    box-shadow:0 1px 0 rgba(255,255,255,.75) inset, 0 2px 4px rgba(0,0,0,.3);
  }
  .loadbtn{ padding:9px 13px; font-size:12px; white-space:nowrap; }
  .loadbtn.rec{ color:#fff; border-color:#9c151f; background:linear-gradient(180deg,#ff6a6a,#d8232f); box-shadow:0 0 14px rgba(216,35,47,.5), inset 0 1px 0 rgba(255,255,255,.3); }
  .ctl{ padding:11px 16px; font-size:12px; letter-spacing:1px; }
  .loadbtn:active,.ctl:active,.mbtn:active{ background:linear-gradient(180deg,var(--metal-md),var(--metal-lo)); box-shadow:inset 0 1px 3px rgba(0,0,0,.45); }
  .ctl[disabled]{ opacity:.45; }

  /* ---- turntable ---- */
  .stage{ flex:1; display:flex; align-items:center; justify-content:center; position:relative; min-height:0; padding:4px; }
  .platter{
    position:relative; width:min(86vw, 54vh); aspect-ratio:1/1; border-radius:50%;
    touch-action:none;
    background:radial-gradient(circle at 50% 50%, #34373c 0 4%, #25272b 4% 100%);
    box-shadow:
      0 20px 50px rgba(0,0,0,.5),
      0 2px 0 rgba(255,255,255,.45),
      inset 0 0 0 7px #15171a,
      inset 0 0 0 9px rgba(255,255,255,.05),
      inset 0 0 40px rgba(0,0,0,.6);
  }
  .disc-rot{ position:absolute; inset:0; border-radius:50%; will-change:transform; }
  .strobe{
    position:absolute; inset:1.5%; border-radius:50%; pointer-events:none;
    background:repeating-conic-gradient(from 0deg, #e9cda3 0deg .9deg, rgba(0,0,0,0) .9deg 4.2deg);
    -webkit-mask:radial-gradient(circle, transparent 0 90%, #000 90.5% 95.5%, transparent 96%);
            mask:radial-gradient(circle, transparent 0 90%, #000 90.5% 95.5%, transparent 96%);
    opacity:.6;
  }
  .vinyl{
    position:absolute; inset:7%; border-radius:50%; pointer-events:none;
    background:
      radial-gradient(circle at 50% 50%, #232528 0 23%, #34373c 23% 23.6%, #131416 24% 100%),
      repeating-radial-gradient(circle at 50% 50%, rgba(255,255,255,.04) 0 1px, rgba(0,0,0,.55) 1.3px 3px);
    box-shadow: inset 0 0 60px rgba(0,0,0,.85), inset 0 0 0 2px rgba(255,255,255,.04);
  }
  .vinyl::after{ /* sheen */
    content:""; position:absolute; inset:0; border-radius:50%;
    background:conic-gradient(from 210deg, rgba(255,255,255,.10), rgba(255,255,255,0) 70deg, rgba(255,255,255,0) 250deg, rgba(255,255,255,.07) 320deg, rgba(255,255,255,0) 360deg);
  }
  .rlabel{
    position:absolute; top:50%; left:50%; transform:translate(-50%,-50%);
    width:38%; aspect-ratio:1/1; border-radius:50%; pointer-events:none;
    background:radial-gradient(circle at 42% 34%, #ff7059, var(--red) 56%, var(--red-d) 100%);
    display:flex; align-items:center; justify-content:center; text-align:center; color:#fff3ee;
    box-shadow: inset 0 0 0 1px rgba(0,0,0,.35), inset 0 0 0 5px rgba(255,255,255,.08), 0 1px 4px rgba(0,0,0,.45);
  }
  .marker{
    position:absolute; top:8%; left:50%; transform:translateX(-50%); pointer-events:none;
    width:9px; height:9px; border-radius:50%;
    background:radial-gradient(circle,#fff,#c2c6cb); box-shadow:0 0 6px rgba(255,255,255,.55);
  }
  .spindle{
    position:absolute; top:50%; left:50%; width:3.6%; aspect-ratio:1/1; border-radius:50%;
    transform:translate(-50%,-50%); pointer-events:none; z-index:3;
    background:radial-gradient(circle at 40% 34%, #fff, #cacfd3 42%, #8c9196 72%, #5d6267);
    box-shadow:0 1px 3px rgba(0,0,0,.6), inset 0 0 0 1px rgba(255,255,255,.45);
  }

  /* ---- control panel ---- */
  .panel{ display:flex; align-items:center; gap:14px; padding:6px 18px 8px; }
  .ss{
    -webkit-appearance:none; appearance:none; cursor:pointer; position:relative;
    width:62px; height:62px; border-radius:50%; border:1px solid var(--metal-edge);
    background:linear-gradient(180deg,var(--metal-hi),var(--metal-md));
    box-shadow:0 3px 7px rgba(0,0,0,.35), inset 0 0 0 1px rgba(255,255,255,.55);
    display:flex; flex-direction:column; align-items:center; justify-content:center; gap:5px;
    color:var(--ink); font-size:9px; font-weight:800; letter-spacing:1px;
  }
  .ss:active{ box-shadow:inset 0 2px 6px rgba(0,0,0,.45); }
  .ss[disabled]{ opacity:.5; }
  .ss .led{ width:11px; height:11px; border-radius:50%; background:#3a3f3c; box-shadow:inset 0 0 3px rgba(0,0,0,.6); }
  .ss.playing .led{ background:var(--led); box-shadow:0 0 8px var(--led), 0 0 16px rgba(55,226,159,.6); }
  .lcd{
    margin-left:auto; font-variant-numeric:tabular-nums; font-weight:700; letter-spacing:1px;
    color:var(--lcd); background:var(--lcd-bg); border:1px solid #04120a; border-radius:6px;
    padding:9px 11px; font-size:13px; box-shadow:inset 0 0 8px rgba(0,0,0,.75);
    font-family:"Menlo","SF Mono",monospace; text-shadow:0 0 6px rgba(124,255,178,.5);
  }

  /* ---- cut fader ---- */
  .fader{
    margin:4px 16px calc(14px + env(safe-area-inset-bottom));
    height:82px; border-radius:14px; position:relative; touch-action:none; overflow:hidden;
    border:1px solid var(--metal-edge);
    background:linear-gradient(180deg,#2b2d31,#161719);
    box-shadow:inset 0 0 0 1px rgba(255,255,255,.05), inset 0 6px 14px rgba(0,0,0,.6), 0 2px 0 rgba(255,255,255,.35);
    display:flex; align-items:center; justify-content:center;
    transition:box-shadow .05s, background .05s;
  }
  .fader .flabel{ font-weight:900; font-size:20px; letter-spacing:5px; color:#6c7075; }
  .fader.on{ background:linear-gradient(180deg,#123a30,#0a221b); box-shadow:inset 0 0 0 2px var(--led), 0 0 22px rgba(55,226,159,.3); }
  .fader.on .flabel{ color:var(--led); text-shadow:0 0 10px rgba(55,226,159,.6); }
  .fader .sub{ position:absolute; top:7px; left:12px; font-size:10px; color:#7d8186; }
  .fader .modebtn{ position:absolute; top:6px; right:8px; }
  .fader .modebtn .mbtn{ padding:5px 9px; font-size:10px; }

  input[type=file]{display:none;}
  .overlay{
    position:fixed; inset:0; background:rgba(0,0,0,.82); display:none; color:#f0f0f0;
    align-items:center; justify-content:center; flex-direction:column; gap:14px; z-index:10; padding:30px; text-align:center;
  }
  .overlay.show{display:flex;}
  #overlayMsg{white-space:pre-line; line-height:1.5; font-size:14px;}
  .spinner{width:34px;height:34px;border:3px solid rgba(255,255,255,.2);border-top-color:var(--red);border-radius:50%;animation:spin 1s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg);}}
</style>
</head>
<body>
  <header>
    <div class="brand">
      <span class="b1">SCRATCH</span>
      <span class="b2">SL-1200 STYLE</span>
    </div>
    <span class="track" id="track">ファイル未読み込み</span>
    <button class="loadbtn" id="recBtn">🎤 録音</button>
    <button class="loadbtn" id="loadBtn">読み込み</button>
    <input type="file" id="file" accept="audio/*,video/*,.wav,.mp3,.m4a,.aac,.mp4,.mov">
  </header>

  <div class="stage">
    <div class="platter" id="platter">
      <div class="disc-rot" id="disc">
        <div class="strobe"></div>
        <div class="vinyl"></div>
        <div class="rlabel"></div>
        <div class="marker"></div>
      </div>
      <div class="spindle"></div>
    </div>
  </div>

  <div class="panel">
    <button class="ss" id="play" disabled><span class="led"></span><span class="sslabel">START</span></button>
    <button class="ctl" id="cue" disabled>CUE</button>
    <div class="lcd" id="time">0:00 / 0:00</div>
  </div>

  <div class="fader" id="fader">
    <span class="flabel">CUT</span>
    <span class="modebtn"><button class="mbtn" id="modeBtn">Transform</button></span>
  </div>

  <div class="overlay" id="overlay">
    <div class="spinner"></div>
    <div id="overlayMsg">デコード中…</div>
  </div>

<script>
/* ============ AudioWorklet processor (Blob module) ============ */
const processorCode = `
class ScratchProcessor extends AudioWorkletProcessor {
  static get parameterDescriptors(){ return [{name:'rate', defaultValue:0, automationRate:'a-rate'}]; }
  constructor(){
    super();
    this.L=null; this.R=null; this.len=0; this.pos=0; this.report=0;
    this.port.onmessage=(e)=>{
      const d=e.data;
      if(d.type==='load'){ this.L=d.left; this.R=d.right||d.left; this.len=this.L.length; this.pos=0; }
      else if(d.type==='seek'){ this.pos=d.pos; }
    };
  }
  process(inputs, outputs, params){
    const out=outputs[0]; const oL=out[0]; const oR=out[1]||out[0];
    const n=oL.length;
    if(!this.L || this.len===0){ for(let i=0;i<n;i++){ oL[i]=0; oR[i]=0; } return true; }
    const L=this.L, R=this.R, len=this.len;
    const rate=params.rate; const cr=rate.length===1;
    let pos=this.pos;
    for(let i=0;i<n;i++){
      while(pos>=len) pos-=len;
      while(pos<0) pos+=len;
      const i0=pos|0; let i1=i0+1; if(i1>=len) i1=0;
      const f=pos-i0;
      oL[i]=L[i0]+(L[i1]-L[i0])*f;
      oR[i]=R[i0]+(R[i1]-R[i0])*f;
      pos += cr?rate[0]:rate[i];
    }
    while(pos>=len) pos-=len; while(pos<0) pos+=len;
    this.pos=pos;
    this.report+=n;
    if(this.report>=2048){ this.report=0; this.port.postMessage({type:'pos', pos:this.pos}); }
    return true;
  }
}
registerProcessor('scratch', ScratchProcessor);
`;

/* ============ Globals ============ */
let ctx, node, gain, rateParam, sampleRate;
let SAMPLES_PER_REV = 0;
const SEC_PER_REV = 1.8;      // レコード1回転 ≈ 1.8秒 (33⅓rpm 相当)
const MAX_RATE = 12;
let loaded=false, basePlaying=false, scratching=false, curPos=0, totalSec=0;
let trackLen=0, prevPos=0, rotDeg=0; // 回転は実移動量を積算（ループでリセットしない）
let faderMode='transform';    // 'transform' = 押すと音 / 'cut' = 押すとカット
let faderPressed=false;

/* ============ Audio init ============ */
// iOS対策: タップ(ジェスチャ)内で同期的にAudioContextを生成&resumeして解放する
function ensureCtx(){
  if(!ctx){
    ctx = new (window.AudioContext||window.webkitAudioContext)();
    sampleRate = ctx.sampleRate;
    SAMPLES_PER_REV = sampleRate * SEC_PER_REV;
  }
  if(ctx.state==='suspended'){ ctx.resume(); }
}
let workletReady=false;
async function initWorklet(){
  ensureCtx();
  if(workletReady) return;
  const url = URL.createObjectURL(new Blob([processorCode], {type:'application/javascript'}));
  await ctx.audioWorklet.addModule(url);
  URL.revokeObjectURL(url);
  node = new AudioWorkletNode(ctx, 'scratch', {outputChannelCount:[2]});
  rateParam = node.parameters.get('rate');
  gain = ctx.createGain();
  gain.gain.value = 0; // Transformモード初期: 押すまで無音
  node.connect(gain).connect(ctx.destination);
  node.port.onmessage = (e)=>{ if(e.data.type==='pos') curPos=e.data.pos; };
  workletReady=true;
}
// Safari互換: コールバック式 + タイムアウトでデコード（固まらないように）
function decodeAudio(arr){
  return new Promise((resolve,reject)=>{
    let done=false;
    const t=setTimeout(()=>{ if(!done){done=true; reject(new Error('時間切れ（対応していない形式かもしれません）'));} }, 30000);
    const ok=(b)=>{ if(!done){done=true; clearTimeout(t); resolve(b);} };
    const ng=(e)=>{ if(!done){done=true; clearTimeout(t); reject(e||new Error('デコード失敗'));} };
    try{
      const p=ctx.decodeAudioData(arr, ok, ng);
      if(p&&p.then){ p.then(ok).catch(ng); }
    }catch(e){ ng(e); }
  });
}

/* ============ Load a decoded buffer into the scratch engine (shared) ============ */
function useBuffer(buf, name){
  const left = buf.getChannelData(0).slice(0);
  let right;
  if(buf.numberOfChannels>1){ right = buf.getChannelData(1).slice(0); }
  const msg = {type:'load', left}; const transfer=[left.buffer];
  if(right){ msg.right=right; transfer.push(right.buffer); }
  node.port.postMessage(msg, transfer);
  totalSec = buf.length / buf.sampleRate;
  trackLen = buf.length;
  curPos=0; prevPos=0; rotDeg=0; loaded=true; basePlaying=false;
  document.getElementById('track').textContent = name;
  document.getElementById('play').disabled=false;
  document.getElementById('cue').disabled=false;
  updatePlayBtn();
  rateParam.cancelScheduledValues(ctx.currentTime);
  rateParam.setValueAtTime(0, ctx.currentTime);
}

/* ============ File load ============ */
const fileInput=document.getElementById('file');
document.getElementById('loadBtn').addEventListener('click', ()=>{ ensureCtx(); fileInput.click(); });

fileInput.addEventListener('change', async (e)=>{
  const f=e.target.files[0]; if(!f) return;
  const log=(m)=>{ document.getElementById('overlayMsg').textContent=m; };
  showOverlay('オーディオ初期化中…');
  try{
    await initWorklet();
    ensureCtx();
    log('ファイル読込中… ('+(Math.round(f.size/1024/1024*10)/10)+'MB)');
    const arr = await f.arrayBuffer();
    log('デコード中…（少しお待ちください）');
    const buf = await decodeAudio(arr);
    log('準備中…');
    useBuffer(buf, f.name);
    hideOverlay();
  }catch(err){
    console.error(err);
    log('読み込めませんでした：\n'+(((err&&err.message)||err)+'')+'\n\n画面をタップして閉じる');
  }
  e.target.value='';
});

/* ============ Mic recording ============ */
const recBtn=document.getElementById('recBtn');
let mediaRec=null, recChunks=[], recStream=null, recTimer=null, recStartT=0;
recBtn.addEventListener('click', async ()=>{
  if(mediaRec && mediaRec.state==='recording'){ try{ mediaRec.stop(); }catch(_){} return; }
  try{
    ensureCtx();
    if(!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia){
      showOverlay('このブラウザはマイク録音に対応していません\n\n画面をタップして閉じる'); return;
    }
    recStream = await navigator.mediaDevices.getUserMedia({audio:{echoCancellation:false, noiseSuppression:false, autoGainControl:false}});
    recChunks=[];
    mediaRec = new MediaRecorder(recStream);
    mediaRec.ondataavailable=(e)=>{ if(e.data && e.data.size>0) recChunks.push(e.data); };
    mediaRec.onstop=onRecStop;
    mediaRec.start();
    recBtn.classList.add('rec');
    recStartT=Date.now();
    recTimer=setInterval(()=>{ recBtn.textContent='■ '+fmt((Date.now()-recStartT)/1000); }, 250);
    recBtn.textContent='■ 0:00';
  }catch(err){
    console.error(err);
    showOverlay('マイクを使えませんでした：\n'+((err&&err.message)||err)+'\n\n（マイクの許可が必要です）\n\n画面をタップして閉じる');
    cleanupRec();
  }
});
async function onRecStop(){
  const type = (mediaRec && mediaRec.mimeType) || 'audio/mp4';
  const blob = new Blob(recChunks, {type});
  cleanupRec();
  if(blob.size===0){ return; }
  const log=(m)=>{ document.getElementById('overlayMsg').textContent=m; };
  showOverlay('録音を読み込み中…');
  try{
    await initWorklet();
    const arr = await blob.arrayBuffer();
    const buf = await decodeAudio(arr);
    useBuffer(buf, '🎤 録音 '+new Date().toLocaleTimeString());
    hideOverlay();
  }catch(err){
    console.error(err);
    log('録音を読み込めませんでした：\n'+((err&&err.message)||err)+'\n\n画面をタップして閉じる');
  }
}
function cleanupRec(){
  if(recTimer){ clearInterval(recTimer); recTimer=null; }
  if(recStream){ recStream.getTracks().forEach(t=>t.stop()); recStream=null; }
  mediaRec=null; recChunks=[];
  recBtn.classList.remove('rec'); recBtn.textContent='🎤 録音';
}

/* ============ Play / Stop / Cue ============ */
const playBtn=document.getElementById('play');
playBtn.addEventListener('click', async ()=>{
  if(!loaded) return;
  ensureCtx();
  basePlaying=!basePlaying;
  if(!scratching){
    rateParam.cancelScheduledValues(ctx.currentTime);
    rateParam.setTargetAtTime(basePlaying?1:0, ctx.currentTime, 0.05);
  }
  updatePlayBtn();
});
function updatePlayBtn(){
  playBtn.classList.toggle('playing', basePlaying);
  const lbl=playBtn.querySelector('.sslabel'); if(lbl) lbl.textContent = basePlaying ? 'STOP' : 'START';
}
document.getElementById('cue').addEventListener('click', ()=>{
  if(!loaded) return;
  node.port.postMessage({type:'seek', pos:0}); curPos=0; prevPos=0;
});

/* ============ Turntable scratch (pointer) ============ */
const platter=document.getElementById('platter');
const disc=document.getElementById('disc');
let pPointer=null, cx=0, cy=0, lastAngle=0, lastMove=0, idleZeroed=false;

function angleOf(x,y){ return Math.atan2(y-cy, x-cx); }

platter.addEventListener('pointerdown', (e)=>{
  if(!loaded) return;
  e.preventDefault();
  platter.setPointerCapture(e.pointerId);
  pPointer=e.pointerId;
  const r=platter.getBoundingClientRect();
  cx=r.left+r.width/2; cy=r.top+r.height/2;
  lastAngle=angleOf(e.clientX,e.clientY);
  lastMove=performance.now(); idleZeroed=false;
  scratching=true;
  rateParam.cancelScheduledValues(ctx.currentTime);
  rateParam.setTargetAtTime(0, ctx.currentTime, 0.005); // 触れた瞬間は止める
});
platter.addEventListener('pointermove', (e)=>{
  if(e.pointerId!==pPointer) return;
  e.preventDefault();
  const now=performance.now();
  const a=angleOf(e.clientX,e.clientY);
  let da=a-lastAngle;
  if(da>Math.PI) da-=2*Math.PI; else if(da<-Math.PI) da+=2*Math.PI;
  const dt=(now-lastMove)/1000;
  lastAngle=a; lastMove=now; idleZeroed=false;
  if(dt>0){
    const revPerSec=(da/(2*Math.PI))/dt;
    let rate=revPerSec*SEC_PER_REV;
    rate=Math.max(-MAX_RATE, Math.min(MAX_RATE, rate));
    rateParam.cancelScheduledValues(ctx.currentTime);
    rateParam.setTargetAtTime(rate, ctx.currentTime, 0.01);
  }
});
function endScratch(e){
  if(e.pointerId!==pPointer) return;
  pPointer=null; scratching=false;
  rateParam.cancelScheduledValues(ctx.currentTime);
  rateParam.setTargetAtTime(basePlaying?1:0, ctx.currentTime, 0.07); // 離したら元の状態へ
}
platter.addEventListener('pointerup', endScratch);
platter.addEventListener('pointercancel', endScratch);

/* ============ Fader (momentary cut) ============ */
const fader=document.getElementById('fader');
let fPointer=null;

function applyGain(){
  if(!gain) return;
  // transform: 押す=音(1), 離す=無音(0) / cut: 押す=無音(0), 離す=音(1)
  let on = (faderMode==='transform') ? faderPressed : !faderPressed;
  gain.gain.cancelScheduledValues(ctx.currentTime);
  gain.gain.setTargetAtTime(on?1:0, ctx.currentTime, 0.004); // クリックノイズ防止
}
fader.addEventListener('pointerdown',(e)=>{
  e.preventDefault();
  if(!ctx) return;
  fader.setPointerCapture(e.pointerId); fPointer=e.pointerId;
  faderPressed=true; fader.classList.toggle('on', faderMode==='transform'); applyGain();
});
function faderUp(e){
  if(e.pointerId!==fPointer) return;
  fPointer=null; faderPressed=false;
  fader.classList.toggle('on', faderMode==='cut'); applyGain();
}
fader.addEventListener('pointerup', faderUp);
fader.addEventListener('pointercancel', faderUp);

document.getElementById('modeBtn').addEventListener('click',(e)=>{
  e.stopPropagation();
  faderMode = (faderMode==='transform') ? 'cut' : 'transform';
  document.getElementById('modeBtn').textContent = (faderMode==='transform')?'Transform':'Cut';
  const soundOn = (faderMode==='transform') ? faderPressed : !faderPressed;
  fader.classList.toggle('on', soundOn);
  applyGain();
});

/* ============ Animation / time / idle-watchdog ============ */
function fmt(s){ s=Math.max(0,s|0); return (s/60|0)+':'+String(s%60).padStart(2,'0'); }
function tick(){
  if(scratching && !idleZeroed && performance.now()-lastMove>50){
    // 指を止めている間はレコードも停止
    idleZeroed=true;
    rateParam.cancelScheduledValues(ctx.currentTime);
    rateParam.setTargetAtTime(0, ctx.currentTime, 0.02);
  }
  if(SAMPLES_PER_REV && trackLen){
    // 実際の再生位置の差分だけ回転を積算。ループ境界(末尾→先頭)はラップ補正して
    // 連続回転を保つ（曲の繰り返しでマーカーが先頭に戻らない）。
    let d = curPos - prevPos;
    if(d > trackLen/2) d -= trackLen;
    else if(d < -trackLen/2) d += trackLen;
    rotDeg += d / SAMPLES_PER_REV * 360;
    prevPos = curPos;
    disc.style.transform = 'rotate('+ rotDeg +'deg)';
  }
  if(loaded && sampleRate){
    document.getElementById('time').textContent = fmt(curPos/sampleRate)+' / '+fmt(totalSec);
  }
  requestAnimationFrame(tick);
}
requestAnimationFrame(tick);

/* ============ Overlay ============ */
function showOverlay(msg){ document.getElementById('overlayMsg').textContent=msg; document.getElementById('overlay').classList.add('show'); }
function hideOverlay(){ document.getElementById('overlay').classList.remove('show'); }
document.getElementById('overlay').addEventListener('click', hideOverlay);

/* prevent iOS double-tap zoom / pinch / scroll bounce */
document.addEventListener('gesturestart', e=>e.preventDefault());
document.addEventListener('gesturechange', e=>e.preventDefault());
document.addEventListener('touchmove', e=>{ if(e.touches.length>1) e.preventDefault(); }, {passive:false});
// 連続タップ(ダブルタップ)による拡大を抑止（ボタンのタップは通す）
let lastTap=0;
document.addEventListener('touchend', (e)=>{
  if(e.target.closest && e.target.closest('button')) { lastTap=0; return; }
  const now=Date.now();
  if(now-lastTap<=350){ e.preventDefault(); }
  lastTap=now;
}, {passive:false});
</script>
